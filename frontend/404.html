<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在 | AI 热点聚合</title>
    <link rel="stylesheet" href="/static/css/shared.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">🔥 <a href="/"><span>新闻</span>热点</a></div>
            <form class="search-box" action="/search" method="get">
                <input id="search-input" type="text" name="q" placeholder="搜索标题/摘要…" autocomplete="off">
                <button type="submit">搜索</button>
            </form>
            <nav class="nav-links">
                <a href="/">首页</a>
                <a href="/curated">✨ 精选</a>
            </nav>
        </div>
    </header>

    <main class="container" style="text-align: center; padding: 80px 16px;">
        <h1 style="font-size: 48px; margin-bottom: 16px;">🔍 404</h1>
        <h2 style="font-size: 20px; margin-bottom: 8px; color: var(--text);">页面不存在</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">您访问的页面可能已被移除或不存在。</p>
        <a href="/" style="display: inline-block; padding: 10px 24px; background: var(--accent); color: #fff; border-radius: 6px; font-size: 14px;">返回首页</a>
    </main>

    <footer class="footer">
        <p>🔥 新闻热点 — AI 热点聚合</p>
    </footer>
</body>
</html>
